<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>카페24 연동 중...</title></head>
<body>
<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#64748B;">카페24 연동 중입니다. 잠시 후 창이 닫힙니다...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  if (code && window.opener) {
    window.opener.postMessage({ type: "CAFE24_CODE", code, state }, "*");
    setTimeout(() => window.close(), 500);
  } else {
    document.body.innerHTML = '<p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#EF4444;">연동 실패. 창을 닫고 다시 시도해주세요.</p>';
  }
</script>
</body>
</html>
